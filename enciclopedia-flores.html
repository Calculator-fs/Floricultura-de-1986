<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌸 Enciclopédia das Flores</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --text2: #9a9490;
  --text3: #5a5652;
  --accent: #c8a96e;
  --accent2: #e8c88a;
}

*{box-sizing:border-box;margin:0;padding:0}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ---- NOISE OVERLAY ---- */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.025;
  pointer-events:none;
  z-index:1000;
}

/* ---- FLOATING PARTICLES ---- */
.particles {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
}
.particle {
  position:absolute;
  border-radius:50%;
  animation: particle-float linear infinite;
  opacity:0;
}
@keyframes particle-float {
  0%   { transform:translateY(100vh) rotate(0deg); opacity:0; }
  10%  { opacity:0.6; }
  90%  { opacity:0.3; }
  100% { transform:translateY(-20px) rotate(720deg); opacity:0; }
}

/* ---- HERO ---- */
header {
  position:relative;
  text-align:center;
  padding: 80px 20px 60px;
  z-index:2;
}

.hero-ornament {
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
  display:block;
  animation: fadeDown 0.8s ease both;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.6rem, 6vw, 5rem);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -1px;
  animation: fadeDown 0.9s ease 0.1s both;
}

header h1 em {
  font-style: italic;
  color: var(--accent);
}

header p {
  margin-top: 16px;
  color: var(--text2);
  font-size: 1rem;
  font-weight:300;
  max-width: 500px;
  margin-left:auto;
  margin-right:auto;
  line-height:1.7;
  animation: fadeDown 1s ease 0.2s both;
}

.hero-line {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 32px auto 0;
  animation: expand 1.2s ease 0.4s both;
}

@keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
@keyframes expand { from{width:0;opacity:0} to{width:60px;opacity:1} }

/* ---- CONTROLS ---- */
.controls {
  position:sticky;
  top:0;
  z-index:50;
  background: rgba(10,10,10,0.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
}

.controls-inner {
  max-width:1200px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.search-wrap {
  position:relative;
}

.search-icon {
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  color: var(--text3);
  font-size:15px;
  pointer-events:none;
}

#search {
  width:100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 12px 16px 12px 44px;
  border-radius: 12px;
  font-size:14px;
  font-family:'DM Sans',sans-serif;
  outline:none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#search::placeholder { color:var(--text3) }
#search:focus {
  border-color: rgba(200,169,110,0.5);
  box-shadow: 0 0 0 3px rgba(200,169,110,0.1);
}

.tabs {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.tab {
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  font-family:'DM Sans',sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  white-space:nowrap;
}
.tab:hover { border-color: var(--accent); color: var(--accent); }
.tab.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); font-weight:500; }

/* ---- GRID ---- */
.count {
  text-align:center;
  font-size:12px;
  color:var(--text3);
  letter-spacing:1px;
  text-transform:uppercase;
  padding: 24px 0 0;
  z-index:2;
  position:relative;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap:2px;
  padding: 16px 2px 80px;
  max-width:100%;
}

/* ---- CARD ---- */
.card {
  position:relative;
  overflow:hidden;
  cursor:pointer;
  background: var(--bg2);
  aspect-ratio: 3/4;
  transition: transform 0.3s, z-index 0s;
}

.card:hover { z-index:5; transform:scale(1.03); }

.card img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition: transform 0.6s ease, filter 0.6s ease;
  filter: saturate(0.8) brightness(0.75);
}

.card:hover img {
  transform: scale(1.08);
  filter: saturate(1.1) brightness(0.6);
}

.card-overlay {
  position:absolute;
  inset:0;
  background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px;
  transition: background 0.3s;
}

.card:hover .card-overlay {
  background: linear-gradient(to top, rgba(0,0,0,0.97) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.2) 100%);
}

.card-cat {
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  color: var(--accent);
  margin-bottom:6px;
  font-weight:500;
}

.card-name {
  font-family:'Playfair Display',serif;
  font-size:1.3rem;
  font-weight:700;
  line-height:1.2;
  color: #fff;
}

.card-latin {
  font-size:12px;
  font-style:italic;
  color:rgba(255,255,255,0.45);
  margin-top:4px;
}

.card-tags {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:10px;
  opacity:0;
  transform:translateY(8px);
  transition: opacity 0.3s, transform 0.3s;
}
.card:hover .card-tags { opacity:1; transform:translateY(0); }

.card-tag {
  font-size:10px;
  padding:3px 8px;
  border-radius:999px;
  border:1px solid rgba(200,169,110,0.4);
  color:var(--accent2);
  background:rgba(200,169,110,0.08);
}

/* ---- MODAL ---- */
.modal-bg {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(8px);
  z-index:200;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.modal-bg.open { display:flex; }

.modal {
  background: var(--bg2);
  border:1px solid var(--border2);
  border-radius:24px;
  max-width:720px;
  width:100%;
  max-height:90vh;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  animation: modal-in 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes modal-in {
  from{opacity:0;transform:scale(0.88) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.modal-img {
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:24px 24px 0 0;
  display:block;
}

.modal-content { padding:32px; }

.modal-header-row {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:24px;
}

.modal-title-block {}
.modal-cat { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
.modal-name {
  font-family:'Playfair Display',serif;
  font-size:2rem;
  font-weight:700;
  line-height:1.2;
}
.modal-latin {
  font-size:14px;
  font-style:italic;
  color:var(--text2);
  margin-top:6px;
}

.close-btn {
  background:var(--bg3);
  border:1px solid var(--border2);
  color:var(--text2);
  width:40px; height:40px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  transition:all 0.2s;
  line-height:1;
}
.close-btn:hover { background:var(--border2); color:var(--text); transform:rotate(90deg); }

.modal-divider {
  height:1px;
  background:var(--border);
  margin-bottom:24px;
}

.modal-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:24px;
}

.info-block {
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 16px;
}

.info-label {
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:6px;
}

.info-val {
  font-size:14px;
  color:var(--text);
  line-height:1.5;
}

.fun-block {
  background: linear-gradient(135deg, rgba(200,169,110,0.08), rgba(200,169,110,0.03));
  border:1px solid rgba(200,169,110,0.2);
  border-radius:12px;
  padding:16px;
  margin-bottom:24px;
}

.fun-label {
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:8px;
}

.fun-text {
  font-size:14px;
  color:var(--text2);
  line-height:1.7;
}

.modal-close-bottom {
  display:block;
  width:100%;
  padding:14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border:none;
  border-radius:12px;
  color:#0a0a0a;
  font-size:14px;
  font-family:'DM Sans',sans-serif;
  font-weight:500;
  cursor:pointer;
  transition:opacity 0.2s, transform 0.1s;
  letter-spacing:0.5px;
}
.modal-close-bottom:hover { opacity:0.9; transform:scale(1.01); }

/* SCROLLBAR */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:999px; }

/* RESPONSIVE */
@media(max-width:600px){
  .modal-grid { grid-template-columns:1fr; }
  .modal-img { height:220px; }
  .grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header>
  <span class="hero-ornament">✦ Botânica & Natureza ✦</span>
  <h1>Enciclopédia das <em>Flores</em></h1>
  <p>Uma jornada visual por 40 flores do mundo — suas origens, significados, curiosidades e beleza.</p>
  <div class="hero-line"></div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" type="text" placeholder="Buscar por nome, origem, estação..." oninput="render()"/>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
</div>

<div class="count" id="count"></div>
<div class="grid" id="grid"></div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
const flowers = [
  { name:"Rosa", latin:"Rosa", cat:"Clássicas", origin:"Ásia", season:"Primavera/Verão", meaning:"Amor e paixão", care:"Sol pleno, rega 3× semana, pode em março. Adube mensalmente.", fun:"Existem mais de 150 espécies de rosas selvagens. A rosa mais antiga conhecida tem 35 milhões de anos, encontrada em fósseis no Colorado.", tags:["Perfumada","Jardim","Presente"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Rose_Amber_Queen-0035.jpg/640px-Rose_Amber_Queen-0035.jpg" },

  { name:"Girassol", latin:"Helianthus annuus", cat:"Tropicais", origin:"América do Norte", season:"Verão", meaning:"Adoração e lealdade", care:"Sol pleno, rega abundante. Cresce até 3m de altura.", fun:"O girassol jovem gira seguindo o sol (heliotropismo). Uma única cabeça de girassol contém até 2.000 sementes organizadas em espirais de Fibonacci.", tags:["Sol","Alto","Comestível"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Sunflower_sky_backdrop.jpg/640px-Sunflower_sky_backdrop.jpg" },

  { name:"Orquídea", latin:"Orchidaceae", cat:"Exóticas", origin:"Trópicos globais", season:"Ano todo", meaning:"Luxo e beleza rara", care:"Luz indireta, pouca água, substrato especial de casca de pinho.", fun:"É a maior família de plantas com flores: mais de 28.000 espécies conhecidas. Algumas orquídeas imitam insetos fêmeas para atrair polinizadores machos.", tags:["Exótica","Interior","Elegante"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Dendrobium_nobile2.jpg/640px-Dendrobium_nobile2.jpg" },

  { name:"Tulipa", latin:"Tulipa", cat:"Clássicas", origin:"Ásia Central", season:"Primavera", meaning:"Amor perfeito e declaração", care:"Plante bulbos no outono a 15cm de profundidade, sol moderado.", fun:"Na Holanda do século XVII, uma única tulipa rara valia o preço de uma mansão — fenômeno chamado 'Tulipomania'. Causou a primeira bolha econômica registrada.", tags:["Primavera","Bulbo","Colorida"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Simple_camera_shy.jpg/640px-Simple_camera_shy.jpg" },

  { name:"Lavanda", latin:"Lavandula angustifolia", cat:"Aromáticas", origin:"Mediterrâneo", season:"Verão", meaning:"Calma e pureza", care:"Solo seco e pobre, sol pleno. Tolera frio intenso. Não regue demais.", fun:"Usada há mais de 2.500 anos. Os romanos adicionavam lavanda às suas águas de banho — seu nome vem do latim 'lavare' (lavar).", tags:["Aromática","Medicinal","Provence"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Hapus_Ddu_lavender_1.jpg/640px-Hapus_Ddu_lavender_1.jpg" },

  { name:"Margarida", latin:"Bellis perennis", cat:"Silvestres", origin:"Europa", season:"Primavera", meaning:"Inocência e alegria", care:"Solo bem drenado, sol ou meia-sombra. Muito resistente.", fun:"O que parece uma única flor é na verdade uma inflorescência com centenas de flores minúsculas. 'Ela me ama, não me ama' tem origem medieval nesta flor.", tags:["Silvestre","Simples","Alegre"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Daisy_G_01.jpg/640px-Daisy_G_01.jpg" },

  { name:"Hibisco", latin:"Hibiscus rosa-sinensis", cat:"Tropicais", origin:"Ásia Tropical", season:"Verão/Outono", meaning:"Beleza delicada e efêmera", care:"Sol pleno, rega regular, adube mensalmente com fertilizante rico em potássio.", fun:"É a flor nacional da Malásia. Cada flor dura apenas um dia, mas a planta produz dezenas continuamente. Usada em chás e cosméticos naturais.", tags:["Tropical","Chá","Vistosa"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Single_red_hibiscus.jpg/640px-Single_red_hibiscus.jpg" },

  { name:"Jasmim", latin:"Jasminum officinale", cat:"Aromáticas", origin:"Ásia do Sul", season:"Primavera/Verão", meaning:"Amor eterno e boa sorte", care:"Sol ou meia-sombra, solo úmido, precisa de treliça para escalar.", fun:"O cheiro de jasmim é usado em mais de 80% dos perfumes femininos. Uma única grama de extrato puro requer milhares de flores colhidas à mão ao amanhecer.", tags:["Perfumada","Trepadeira","Noturna"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Jasminum_officinale0.jpg/640px-Jasminum_officinale0.jpg" },

  { name:"Lírio", latin:"Lilium candidum", cat:"Clássicas", origin:"Europa/Ásia", season:"Verão", meaning:"Pureza e renovação espiritual", care:"Plante bulbos, sol pleno, excelente drenagem. Tóxico para gatos.", fun:"O pólen do lírio mancha permanentemente tecidos brancos. Na mitologia grega, nasceu das gotas de leite de Hera derramadas no céu.", tags:["Elegante","Funeral","Perfumada"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Lilium_martagon_1.jpg/640px-Lilium_martagon_1.jpg" },

  { name:"Crisântemo", latin:"Chrysanthemum morifolium", cat:"Orientais", origin:"China e Japão", season:"Outono", meaning:"Longevidade e rejuvenescimento", care:"Sol pleno, solo fértil e úmido. Pode após a floração para estimular crescimento.", fun:"No Japão existe o 'Kiku no Sekku' (Festival do Crisântemo), celebrado há mais de 1.200 anos. É o símbolo da família imperial japonesa.", tags:["Outono","Longevidade","Asiática"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Chrysanthemum_2012-10-26_1884.jpg/640px-Chrysanthemum_2012-10-26_1884.jpg" },

  { name:"Papoula", latin:"Papaver rhoeas", cat:"Silvestres", origin:"Europa/Ásia", season:"Primavera", meaning:"Lembrança e sonho", care:"Semeia direto no solo frio, sol pleno. Não transplanta bem.", fun:"A papoula vermelha é símbolo mundial de memória pelos soldados da Primeira Guerra Mundial, inspirado pelo poema 'In Flanders Fields' de 1915.", tags:["Silvestre","Memorial","Delicada"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Papaver_rhoeas_close.jpg/640px-Papaver_rhoeas_close.jpg" },

  { name:"Azaleia", latin:"Rhododendron simsii", cat:"Arbustos", origin:"Ásia Oriental", season:"Primavera", meaning:"Feminilidade e abundância", care:"Solo ácido (pH 4.5-6), meia-sombra, muita umidade. Todas as partes são tóxicas.", fun:"A cidade de Kunming, na China, recebe milhões de turistas todo ano para ver seus festivais de azaleias. Algumas espécies vivem mais de 100 anos.", tags:["Arbusto","Primavera","Ácida"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Rhododendron_Mme_Masson.jpg/640px-Rhododendron_Mme_Masson.jpg" },

  { name:"Dália", latin:"Dahlia pinnata", cat:"Clássicas", origin:"México", season:"Verão/Outono", meaning:"Gratidão e dignidade", care:"Bulbos na primavera, sol pleno, rega regular. Flores chegam a 30cm.", fun:"É a flor nacional do México. Os astecas a usavam como alimento e para tratar epilepsia. Chegou à Europa apenas em 1789 como curiosidade botânica.", tags:["México","Pompom","Outono"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/DahliaDahlstar.jpg/640px-DahliaDahlstar.jpg" },

  { name:"Violeta", latin:"Viola odorata", cat:"Aromáticas", origin:"Europa", season:"Inverno/Primavera", meaning:"Modéstia e fidelidade", care:"Meia-sombra, solo úmido e rico, clima fresco. Ideal para bordaduras.", fun:"Napoleão cultivava violetas e ficou conhecido como 'Corporal Violeta'. Seus seguidores usavam violetas como símbolo secreto de lealdade.", tags:["Pequena","Perfumada","Sombra"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/17/Viola_odorata_fg01.jpg/640px-Viola_odorata_fg01.jpg" },

  { name:"Hortência", latin:"Hydrangea macrophylla", cat:"Arbustos", origin:"Ásia/Américas", season:"Verão", meaning:"Gratidão sincera e compreensão", care:"Meia-sombra, solo ácido torna as flores azuis. Rega abundante.", fun:"A cor das hortênsias muda com o pH do solo: ácido→azul, alcalino→rosa. Adicionar sulfato de alumínio torna as flores azuis mais intensas.", tags:["Jardim","Volume","Mutável"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Hydrangea_macrophylla_Hortensia.jpg/640px-Hydrangea_macrophylla_Hortensia.jpg" },

  { name:"Lótus", latin:"Nelumbo nucifera", cat:"Aquáticas", origin:"Ásia e Austrália", season:"Verão", meaning:"Pureza, iluminação e renascimento", care:"Cresce em água parada a 30cm de profundidade, pleno sol.", fun:"As sementes do lótus podem germinar após 1.300 anos! A planta mantém sua temperatura interna constante a 30–36°C mesmo quando o ar está frio.", tags:["Aquática","Sagrada","Budismo"],
    img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Lotus_flowers_in_pond.jpg/640px-Lotus_flowers_in_pond.jpg" },

  { name:"Íris", latin:"Iris germanica", cat:"Clássicas", origin:"Europa", season:"Primavera", meaning:"Sabedoria e mensagem divina", care:"Solo bem drenado, sol pleno, rizomas semi-expostos à superfície.", fun:"A deusa grega Íris personificava o arco-íris. Cada cor transmite uma mensagem diferente. O nome 'íris' também designa a parte colorida do olho humano.", tags:["Majestosa","Úmida","Grega"],

const cats = ["Todas", ...new Set(flowers.map(f => f.cat))];
let activeTab = "Todas";

// Particles
const pEl = document.getElementById('particles');
const COLORS = ['#c8a96e','#e8c88a','#fff8f0','#6b4c2a'];
for(let i=0;i<28;i++){
  const p = document.createElement('div');
  p.className='particle';
  const s = Math.random()*6+3;
  p.style.cssText = `
    width:${s}px;height:${s}px;
    left:${Math.random()*100}%;
    background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
    animation-duration:${8+Math.random()*14}s;
    animation-delay:${Math.random()*10}s;
    opacity:0;
  `;
  pEl.appendChild(p);
}

function renderTabs(){
  document.getElementById('tabs').innerHTML = cats.map(c =>
    `<button class="tab${activeTab===c?' active':''}" onclick="setTab('${c}')">${c}</button>`
  ).join('');
}

function setTab(t){ activeTab=t; renderTabs(); render(); }

function render(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const list = flowers.filter(f => {
    const matchCat = activeTab==='Todas' || f.cat===activeTab;
    const matchQ = !q || [f.name,f.latin,f.origin,f.season,...f.tags].some(s=>s.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
  document.getElementById('count').textContent = `${list.length} flor${list.length!==1?'es':''} encontrada${list.length!==1?'s':''}`;
  document.getElementById('grid').innerHTML = list.map((f,i)=>`
    <div class="card" style="animation:fadeIn 0.4s ease ${i*0.04}s both" onclick="open_modal(${flowers.indexOf(f)})">
      <img src="${f.img}" alt="${f.name}" loading="lazy" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Rose_Amber_Queen-0035.jpg/640px-Rose_Amber_Queen-0035.jpg'"/>
      <div class="card-overlay">
        <div class="card-cat">${f.cat}</div>
        <div class="card-name">${f.name}</div>
        <div class="card-latin">${f.latin}</div>
        <div class="card-tags">${f.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

function open_modal(idx){
  const f = flowers[idx];
  document.getElementById('modal-inner').innerHTML = `
    <img class="modal-img" src="${f.img}" alt="${f.name}" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Rose_Amber_Queen-0035.jpg/640px-Rose_Amber_Queen-0035.jpg'"/>
    <div class="modal-content">
      <div class="modal-header-row">
        <div class="modal-title-block">
          <div class="modal-cat">${f.cat}</div>
          <div class="modal-name">${f.name}</div>
          <div class="modal-latin">${f.latin}</div>
        </div>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-divider"></div>
      <div class="modal-grid">
        <div class="info-block"><div class="info-label">Origem</div><div class="info-val">${f.origin}</div></div>
        <div class="info-block"><div class="info-label">Floração</div><div class="info-val">${f.season}</div></div>
        <div class="info-block"><div class="info-label">Significado</div><div class="info-val">${f.meaning}</div></div>
        <div class="info-block"><div class="info-label">Cuidados</div><div class="info-val">${f.care}</div></div>
      </div>
      <div class="fun-block">
        <div class="fun-label">✦ Curiosidade</div>
        <div class="fun-text">${f.fun}</div>
      </div>
      <button class="modal-close-bottom" onclick="closeModal()">Fechar</button>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

const style = document.createElement('style');
style.textContent = `@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}`;
document.head.appendChild(style);

renderTabs();
render();
</script>
</body>
</html>
